<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KlaseCo Mission Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: #fff; -webkit-overflow-scrolling: touch; touch-action: none; }
  canvas { display: block; width: 100% !important; height: 100% !important; touch-action: none; }

  /* Tooltip */
  #tooltip {
    position: fixed; pointer-events: none; display: none;
    background: rgba(10,10,30,0.92); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    max-width: 260px; backdrop-filter: blur(8px); z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: opacity 0.15s;
  }
  #tooltip .tt-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  #tooltip .tt-role { opacity: 0.7; font-size: 12px; margin-bottom: 4px; }
  #tooltip .tt-desc { font-size: 12px; opacity: 0.85; line-height: 1.4; }
  #tooltip .tt-status {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; margin-top: 4px;
  }

  /* Detail Panel — desktop */
  #detail-panel {
    position: fixed; top: 50%; right: 30px; transform: translateY(-50%);
    width: 320px; background: rgba(10,10,30,0.95); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 24px; display: none; z-index: 200;
    backdrop-filter: blur(12px); box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  #detail-panel .dp-close {
    position: absolute; top: 12px; right: 14px; cursor: pointer;
    font-size: 18px; opacity: 0.6; transition: opacity 0.2s;
    min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
  }
  #detail-panel .dp-close:hover, #detail-panel .dp-close:active { opacity: 1; }
  #detail-panel .dp-icon { font-size: 32px; margin-bottom: 8px; }
  #detail-panel .dp-name { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  #detail-panel .dp-role { opacity: 0.6; font-size: 13px; margin-bottom: 12px; }
  #detail-panel .dp-status {
    display: inline-block; padding: 3px 10px; border-radius: 5px;
    font-size: 12px; font-weight: 600; margin-bottom: 12px;
  }
  #detail-panel .dp-desc { font-size: 13px; line-height: 1.6; opacity: 0.85; margin-bottom: 12px; }
  #detail-panel .dp-connections { font-size: 12px; opacity: 0.6; }
  #detail-panel .dp-connections span { display: block; margin: 2px 0; }
  /* Drag handle for bottom sheet */
  #detail-panel .dp-drag-handle {
    display: none; width: 40px; height: 4px; background: rgba(255,255,255,0.3);
    border-radius: 2px; margin: 0 auto 16px;
  }

  /* HUD */
  #hud {
    position: fixed; top: 20px; left: 20px; z-index: 50;
    font-size: 11px; opacity: 0.5;
  }
  #hud h1 { font-size: 16px; font-weight: 700; letter-spacing: 2px; opacity: 1; }
  #hud p { margin-top: 4px; }

  /* Legend */
  #legend {
    position: fixed; bottom: 20px; left: 20px; z-index: 50;
    font-size: 11px; opacity: 0.6;
  }
  #legend div { margin: 3px 0; display: flex; align-items: center; gap: 6px; }
  #legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* ── Mobile: < 768px ── */
  @media (max-width: 767px) {
    #hud {
      top: 10px; left: 10px; right: 10px;
    }
    #hud h1 { font-size: 13px; letter-spacing: 1px; }
    #hud p { font-size: 10px; }

    #legend {
      bottom: 10px; left: 10px;
      font-size: 10px;
      background: rgba(0,0,0,0.6); border-radius: 8px; padding: 8px 10px;
      backdrop-filter: blur(6px);
    }

    #tooltip {
      max-width: calc(100vw - 32px);
      font-size: 12px;
    }

    /* Bottom sheet style detail panel */
    #detail-panel {
      position: fixed;
      top: auto; right: 0; bottom: 0; left: 0;
      transform: translateY(0);
      width: 100%; max-width: 100%;
      border-radius: 16px 16px 0 0;
      max-height: 60vh;
      padding: 12px 20px 24px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      /* iOS safe area */
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    }
    #detail-panel .dp-drag-handle { display: block; }
    #detail-panel .dp-icon { font-size: 28px; }
    #detail-panel .dp-name { font-size: 18px; }
    #detail-panel .dp-role { font-size: 12px; }
    #detail-panel .dp-desc { font-size: 12px; }
    #detail-panel .dp-close {
      top: 8px; right: 8px;
    }
  }

  /* Very small screens (iPhone SE) */
  @media (max-width: 375px) {
    #hud h1 { font-size: 11px; }
    #legend { font-size: 9px; }
    #detail-panel { max-height: 55vh; }
  }
</style>
</head>
<body>

<div id="hud">
  <h1>KLASECO MISSION CONTROL</h1>
  <p id="hud-instructions">Click + drag to orbit · Scroll to zoom · Hover/click nodes</p>
</div>

<div id="legend">
  <div style="font-weight:700;margin-bottom:4px;opacity:0.8;">Leadership</div>
  <div><span class="dot" style="background:#FFD700"></span> Alex (CEO)</div>
  <div><span class="dot" style="background:#4CAF50"></span> Kiwi (COO)</div>
  <div style="font-weight:700;margin-top:6px;margin-bottom:4px;opacity:0.8;">C-Suite</div>
  <div><span class="dot" style="background:#3B82F6"></span> Bolt (CTO)</div>
  <div><span class="dot" style="background:#F59E0B"></span> Spark (CSO)</div>
  <div><span class="dot" style="background:#EC4899"></span> Echo (CMO)</div>
  <div><span class="dot" style="background:#06B6D4"></span> Lens (CRO)</div>
  <div><span class="dot" style="background:#DC2626"></span> Counsel (CLO)</div>
  <div><span class="dot" style="background:#8B5CF6"></span> Relay (CIO)</div>
  <div><span class="dot" style="background:#10B981"></span> Ledger (CFO)</div>
  <div><span class="dot" style="background:#6366F1"></span> Shield (CISO)</div>
  <div style="font-weight:700;margin-top:6px;margin-bottom:4px;opacity:0.8;">Projects</div>
  <div><span class="dot" style="background:#00ff88"></span> Active / Building</div>
  <div><span class="dot" style="background:#ffdd00"></span> In Progress</div>
  <div><span class="dot" style="background:#4488ff"></span> Planned / Long Term</div>
  <div><span class="dot" style="background:#ffffff"></span> Systems</div>
</div>

<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-role"></div>
  <div class="tt-desc"></div>
  <div class="tt-status"></div>
</div>

<div id="detail-panel">
  <div class="dp-drag-handle"></div>
  <div class="dp-close" onclick="closeDetail()">✕</div>
  <div class="dp-icon"></div>
  <div class="dp-name"></div>
  <div class="dp-role"></div>
  <div class="dp-status"></div>
  <div class="dp-desc"></div>
  <div class="dp-connections"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ============================================================
// KlaseCo Mission Control — 3D Visualization (Mobile-Responsive)
// ============================================================

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

// Update instructions for mobile
if (isMobile) {
  document.getElementById('hud-instructions').textContent = 'Drag to rotate · Pinch to zoom · Tap nodes for details';
}

// --- Scene Setup ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, isMobile ? 40 : 32);

const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 2 : 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 8;
controls.maxDistance = 60;
controls.target.set(0, 2, 0);
// Touch controls are enabled by default in OrbitControls:
// - One finger drag = rotate
// - Pinch = zoom
// - Two finger drag = pan
controls.touches = {
  ONE: THREE.TOUCH.ROTATE,
  TWO: THREE.TOUCH.DOLLY_PAN
};

// --- Colors ---
const COLORS = {
  green: 0x00ff88, yellow: 0xffdd00, blue: 0x4488ff,
  gold: 0xFFD700, kiwi: 0x4CAF50, white: 0xffffff,
  // Agent-specific colors
  boltBlue: 0x3B82F6, sparkOrange: 0xF59E0B, echoPink: 0xEC4899,
  lensCyan: 0x06B6D4, crimson: 0xDC2626, relayPurple: 0x8B5CF6,
  emerald: 0x10B981, indigo: 0x6366F1,
};

function hexToCSS(hex) { return '#' + hex.toString(16).padStart(6, '0'); }

// --- Starfield ---
(function createStars() {
  const geo = new THREE.BufferGeometry();
  const verts = [];
  const count = isMobile ? 1500 : 3000; // fewer stars on mobile for perf
  for (let i = 0; i < count; i++) {
    verts.push((Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.6 });
  scene.add(new THREE.Points(geo, mat));
})();

// --- Lighting ---
scene.add(new THREE.AmbientLight(0x222244, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// --- Data Definitions ---
const nodeData = {};
const allMeshes = [];
const connections = [];
const animatedObjects = [];

// --- Utility: Create glowing material ---
function glowMat(color, emissiveIntensity = 0.6) {
  return new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity,
    metalness: 0.3, roughness: 0.4, transparent: true, opacity: 0.9
  });
}

// --- Utility: Create text sprite (scales with screen) ---
function makeLabel(text, fontSize = 48, color = '#ffffff') {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 512; canvas.height = 64;
  ctx.font = `bold ${fontSize}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  ctx.fillText(text, 256, 48);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  // Scale labels larger on mobile so they're readable
  const labelScale = isMobile ? 5.5 : 4;
  sprite.scale.set(labelScale, labelScale * 0.125, 1);
  return sprite;
}

// --- Utility: Register a node ---
function registerNode(id, mesh, data) {
  mesh.userData = { id, ...data };
  nodeData[id] = { mesh, data };
  allMeshes.push(mesh);
}

// ============================================================
// BUILD THE SCENE
// ============================================================

// --- Central Hub Platform ---
const HUB_Y = 3;
const hubGeo = new THREE.CylinderGeometry(3, 3.5, 0.4, 64);
const hubMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a3a, emissive: 0x1a1a3a, emissiveIntensity: 0.3,
  metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.85
});
const hubMesh = new THREE.Mesh(hubGeo, hubMat);
hubMesh.position.y = HUB_Y;
scene.add(hubMesh);

const ringGeo = new THREE.TorusGeometry(3.25, 0.05, 16, 128);
const ringMat = new THREE.MeshBasicMaterial({ color: COLORS.gold, transparent: true, opacity: 0.6 });
const hubRing = new THREE.Mesh(ringGeo, ringMat);
hubRing.rotation.x = Math.PI / 2;
hubRing.position.y = HUB_Y + 0.2;
scene.add(hubRing);

registerNode('hub', hubMesh, {
  name: 'KlaseCo HQ', role: 'Command Center', icon: '🏢',
  status: 'Operational', statusColor: '#ffffff',
  desc: 'Central command hub. Alex (Founder & CEO) and Kiwi (Chief of Staff / COO) direct all operations from here.',
  connections: ['All projects, agents, and systems']
});

// --- Alex Avatar (gold) ---
const LEADERSHIP_Y = 4.5;
const alexGeo = new THREE.SphereGeometry(0.5, 32, 32);
const alexMesh = new THREE.Mesh(alexGeo, glowMat(COLORS.gold, 0.8));
alexMesh.position.set(-1, LEADERSHIP_Y, 0);
scene.add(alexMesh);
const alexLabel = makeLabel('Alex · Founder & CEO', 36, '#ffd700');
alexLabel.position.set(-1, LEADERSHIP_Y + 1.0, 0);
scene.add(alexLabel);
registerNode('alex', alexMesh, {
  name: 'Alex', role: 'Founder & CEO', icon: '👤',
  status: 'Active', statusColor: '#ffd700',
  desc: 'Founder & CEO of KlaseCo. Strategic visionary, supply chain expert. Sets direction and approves key decisions.',
  connections: ['Kiwi (command flow)', 'All projects (oversight)']
});

// --- Kiwi Avatar (green) ---
const kiwiGeo = new THREE.SphereGeometry(0.45, 32, 32);
const kiwiMesh = new THREE.Mesh(kiwiGeo, glowMat(COLORS.kiwi, 0.8));
kiwiMesh.position.set(1, LEADERSHIP_Y, 0);
scene.add(kiwiMesh);
const kiwiLabel = makeLabel('Kiwi · Chief of Staff / COO 🥝', 34, '#4CAF50');
kiwiLabel.position.set(1, LEADERSHIP_Y + 1.0, 0);
scene.add(kiwiLabel);
registerNode('kiwi', kiwiMesh, {
  name: 'Kiwi Klase', role: 'Chief of Staff / COO 🥝', icon: '🥝',
  status: 'Active', statusColor: '#8bc34a',
  desc: 'AI Chief of Staff / COO. Manages sub-agents, coordinates projects, handles day-to-day operations. Reports to Alex.',
  connections: ['Alex (reports to)', 'All sub-agents (delegates to)', 'All projects (oversees)']
});

// --- Projects (orbiting hub) ---
const projects = [
  { id: 'klaseco', name: 'KlaseCo.com', subtitle: 'Public Journey Site', color: COLORS.green, status: 'Building', icon: '🟢', angle: 0,
    desc: 'The public-facing website documenting the KlaseCo journey. First project to ship.' },
  { id: 'tailwind', name: 'TAILWIND', subtitle: 'Polymarket Copy-Trading', color: COLORS.yellow, status: 'Pivot in Progress', icon: '🟡', angle: 1,
    desc: 'Prediction market copy-trading platform. Currently pivoting strategy based on market research.' },
  { id: 'aperture', name: 'Aperture AI', subtitle: 'Faceless Content Studio', color: COLORS.yellow, status: 'Planning', icon: '🟡', angle: 2,
    desc: 'AI-powered faceless content generation studio. Produces automated video/media content at scale.' },
  { id: 'riftrun', name: 'Rift Run', subtitle: 'Browser Game', color: COLORS.yellow, status: 'Built, Not Shipped', icon: '🟡', angle: 3,
    desc: 'Browser-based game, built but not yet deployed. Needs deployment pipeline and launch plan.' },
  { id: 'spawnpoint', name: 'SpawnPoint', subtitle: 'AI Agent Identity Platform', color: COLORS.blue, status: 'Long Term', icon: '🔵', angle: 4,
    desc: 'Platform for AI agent identity and management. Long-term vision for agent infrastructure.' },
  { id: 'collectibles', name: 'Collectibles Intel', subtitle: 'Price Intelligence', color: COLORS.blue, status: 'Long Term', icon: '🔵', angle: 5,
    desc: 'Price intelligence and analytics for collectibles markets. Data-driven insights for collectors and traders.' },
];

const PROJECT_RADIUS = 10;
const PROJECT_Y = -6;

projects.forEach((p, i) => {
  const angle = (i / projects.length) * Math.PI * 2 - Math.PI / 2;
  const x = Math.cos(angle) * PROJECT_RADIUS;
  const z = Math.sin(angle) * PROJECT_RADIUS;

  const geo = new THREE.OctahedronGeometry(0.7, 0);
  const mesh = new THREE.Mesh(geo, glowMat(p.color, 0.7));
  mesh.position.set(x, PROJECT_Y, z);
  scene.add(mesh);

  const label = makeLabel(p.name, 32);
  label.position.set(x, PROJECT_Y + 1.4, z);
  scene.add(label);

  const statusLabel = makeLabel(p.status, 24, p.color === COLORS.green ? '#00ff88' : p.color === COLORS.yellow ? '#ffdd00' : '#4488ff');
  statusLabel.position.set(x, PROJECT_Y + 0.95, z);
  const statusScale = isMobile ? 4 : 3;
  statusLabel.scale.set(statusScale, statusScale * 0.117, 1);
  scene.add(statusLabel);

  p.x = x; p.z = z; p.mesh = mesh;

  registerNode(p.id, mesh, {
    name: p.name, role: p.subtitle, icon: p.icon,
    status: p.status, statusColor: p.color === COLORS.green ? '#00ff88' : p.color === COLORS.yellow ? '#ffdd00' : '#4488ff',
    desc: p.desc, connections: []
  });

  animatedObjects.push({ mesh, baseY: PROJECT_Y, type: 'bob', phase: i * 0.8 });
});

// --- Sub-Agents ---
const agents = [
  { id: 'bolt', name: 'Bolt', role: 'CTO — Engineering', color: COLORS.boltBlue, icon: '⚡',
    desc: 'Chief Technology Officer. Primary code builder. Handles all engineering tasks across active projects.',
    connectedProjects: ['klaseco', 'tailwind', 'aperture', 'riftrun', 'spawnpoint', 'collectibles'] },
  { id: 'lens', name: 'Lens', role: 'CRO — Research & Revenue', color: COLORS.lensCyan, icon: '🔍',
    desc: 'Chief Revenue Officer. Data gathering, market research, and revenue intelligence.',
    connectedProjects: ['tailwind', 'collectibles'] },
  { id: 'relay', name: 'Relay', role: 'CIO — Infrastructure', color: COLORS.relayPurple, icon: '🔄',
    desc: 'Chief Information Officer. CI/CD pipelines, hosting, and infrastructure.',
    connectedProjects: ['klaseco', 'riftrun'] },
  { id: 'echo', name: 'Echo', role: 'CMO — Marketing & Content', color: COLORS.echoPink, icon: '🎙️',
    desc: 'Chief Marketing Officer. Content generation, voice synthesis, and media production.',
    connectedProjects: ['aperture'] },
  { id: 'spark', name: 'Spark', role: 'CSO — Strategy', color: COLORS.sparkOrange, icon: '💡',
    desc: 'Chief Strategy Officer. High-level reasoning and strategic planning via Claude/Opus.',
    connectedProjects: [] },
  { id: 'counsel', name: 'Counsel', role: 'CLO — Legal', color: COLORS.crimson, icon: '⚖️',
    desc: 'Chief Legal Officer. Reviews regulatory compliance, drafts disclaimers, flags IP and legal risks.',
    connectedProjects: ['klaseco', 'tailwind', 'aperture', 'riftrun', 'spawnpoint', 'collectibles'] },
  { id: 'ledger', name: 'Ledger', role: 'CFO — Finance', color: COLORS.emerald, icon: '📊',
    desc: 'Chief Financial Officer. Financial planning, budgeting, revenue tracking, and fiscal strategy.',
    connectedProjects: ['klaseco', 'tailwind', 'spawnpoint'] },
  { id: 'shield', name: 'Shield', role: 'CISO — Security', color: COLORS.indigo, icon: '🛡️',
    desc: 'Chief Information Security Officer. Security posture, threat assessment, data protection.',
    connectedProjects: ['klaseco', 'spawnpoint', 'tailwind'] },
];

const AGENT_RADIUS = 16;
const AGENT_Y = -1;

agents.forEach((a, i) => {
  const angle = (i / agents.length) * Math.PI * 2 + Math.PI / 6;
  const x = Math.cos(angle) * AGENT_RADIUS;
  const z = Math.sin(angle) * AGENT_RADIUS;

  const geo = new THREE.IcosahedronGeometry(0.4, 0);
  const mesh = new THREE.Mesh(geo, glowMat(a.color, 0.8));
  mesh.position.set(x, AGENT_Y, z);
  scene.add(mesh);

  const agentColorCSS = hexToCSS(a.color);
  const label = makeLabel(`${a.name}`, 28, agentColorCSS);
  label.position.set(x, AGENT_Y + 1.0, z);
  const agentLabelScale = isMobile ? 3.2 : 2.5;
  label.scale.set(agentLabelScale, agentLabelScale * 0.14, 1);
  scene.add(label);

  const roleLabel = makeLabel(a.role, 20, '#aaaacc');
  roleLabel.position.set(x, AGENT_Y + 0.6, z);
  const roleLabelScale = isMobile ? 4.2 : 3.5;
  roleLabel.scale.set(roleLabelScale, roleLabelScale * 0.1, 1);
  scene.add(roleLabel);

  a.x = x; a.z = z; a.mesh = mesh;

  const connNames = a.connectedProjects.map(pid => {
    const proj = projects.find(p => p.id === pid);
    return proj ? proj.name : 'Hub';
  });
  if (a.id === 'spark') connNames.push('KlaseCo HQ');

  registerNode(a.id, mesh, {
    name: a.name, role: a.role, icon: a.icon,
    status: 'Active', statusColor: '#' + a.color.toString(16).padStart(6, '0'),
    desc: a.desc, connections: connNames
  });

  animatedObjects.push({ mesh, baseY: AGENT_Y, type: 'bob', phase: i * 1.2 + 3 });
});

// --- Systems Layer (TOP — above hub) ---
const SYSTEMS_Y = 8;
const systems = [
  { id: 'memory', name: 'Memory System', role: 'MEMORY.md + Daily Notes + Cron', color: COLORS.white, icon: '🧠',
    desc: 'Persistent memory layer. Daily notes, long-term memory, and scheduled cron jobs for continuity.',
    x: -5, z: -6, y: SYSTEMS_Y },
  { id: 'approval', name: 'Approval Queue', role: 'Gate / Checkpoint', color: COLORS.white, icon: '✅',
    desc: 'Human-in-the-loop approval gate. External actions require Alex\'s explicit approval before execution.',
    x: 5, z: -6, y: SYSTEMS_Y },
  { id: 'github', name: 'GitHub Backup', role: 'Version Control & Storage', color: COLORS.white, icon: '💾',
    desc: 'Git-based backup and version control. All code, configs, and workspace files are tracked.',
    x: 5, z: 6, y: SYSTEMS_Y },
  { id: 'discord', name: 'Discord (Klase HQ)', role: 'Communication Hub', color: COLORS.white, icon: '💬',
    desc: 'Team communication channel. Klase HQ Discord server for coordination and updates.',
    x: -5, z: 6, y: SYSTEMS_Y },
];

systems.forEach((s, i) => {
  const geo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
  const mesh = new THREE.Mesh(geo, glowMat(0x667799, 0.5));
  mesh.position.set(s.x, s.y, s.z);
  scene.add(mesh);

  const label = makeLabel(s.name, 26);
  label.position.set(s.x, s.y + 1.0, s.z);
  const sysLabelScale = isMobile ? 3.8 : 3;
  label.scale.set(sysLabelScale, sysLabelScale * 0.117, 1);
  scene.add(label);

  registerNode(s.id, mesh, {
    name: s.name, role: s.role, icon: s.icon,
    status: 'Online', statusColor: '#ffffff',
    desc: s.desc, connections: ['Hub']
  });

  animatedObjects.push({ mesh, baseY: s.y, type: 'pulse', phase: i * 1.5 });
});

// ============================================================
// CONNECTIONS (animated lines + particles)
// ============================================================

function createConnection(fromPos, toPos, color, particleCount = 8) {
  // Fewer particles on mobile for performance
  const pCount = isMobile ? Math.max(1, Math.floor(particleCount / 2)) : particleCount;
  const points = [fromPos.clone(), toPos.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.25 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  const particles = [];
  const particleGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const particleMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 });
  for (let i = 0; i < pCount; i++) {
    const p = new THREE.Mesh(particleGeo, particleMat);
    p.visible = false;
    scene.add(p);
    particles.push({ mesh: p, t: i / pCount, speed: 0.15 + Math.random() * 0.1 });
  }

  return { line, particles, from: fromPos.clone(), to: toPos.clone() };
}

// Alex → Kiwi
connections.push(createConnection(new THREE.Vector3(-1, LEADERSHIP_Y, 0), new THREE.Vector3(1, LEADERSHIP_Y, 0), COLORS.gold, 4));

// Kiwi → Sub-agents
agents.forEach(a => {
  connections.push(createConnection(new THREE.Vector3(1, LEADERSHIP_Y, 0), new THREE.Vector3(a.x, AGENT_Y, a.z), COLORS.kiwi, 3));
});

// Sub-agents → Projects
agents.forEach(a => {
  a.connectedProjects.forEach(pid => {
    const proj = projects.find(p => p.id === pid);
    if (proj) {
      connections.push(createConnection(
        new THREE.Vector3(a.x, AGENT_Y, a.z),
        new THREE.Vector3(proj.x, PROJECT_Y, proj.z),
        a.color, 2
      ));
    }
  });
  if (a.id === 'spark') {
    connections.push(createConnection(new THREE.Vector3(a.x, AGENT_Y, a.z), new THREE.Vector3(0, HUB_Y, 0), COLORS.sparkOrange, 3));
  }
});

// Projects → Systems
projects.forEach(p => {
  systems.forEach(s => {
    if (s.id === 'memory' || s.id === 'github') {
      connections.push(createConnection(
        new THREE.Vector3(p.x, PROJECT_Y, p.z),
        new THREE.Vector3(s.x, s.y, s.z),
        0x445566, 1
      ));
    }
  });
});

// Hub → Systems
systems.forEach(s => {
  connections.push(createConnection(new THREE.Vector3(0, HUB_Y, 0), new THREE.Vector3(s.x, s.y, s.z), 0x667799, 2));
});

// ============================================================
// INTERACTION (hover/tap + click)
// ============================================================

const raycaster = new THREE.Raycaster();
// Increase raycaster threshold on mobile for easier tapping
if (isMobile) {
  raycaster.params.Points = { threshold: 0.5 };
}
const mouse = new THREE.Vector2();
const tooltipEl = document.getElementById('tooltip');
const detailPanel = document.getElementById('detail-panel');
let hoveredNode = null;
let lastTapTime = 0;

// Clamp tooltip within viewport
function positionTooltip(x, y) {
  const tw = tooltipEl.offsetWidth;
  const th = tooltipEl.offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let left = x + 15;
  let top = y + 15;

  // Keep within bounds
  if (left + tw > vw - 10) left = vw - tw - 10;
  if (left < 10) left = 10;
  if (top + th > vh - 10) top = vh - th - 10;
  if (top < 10) top = 10;

  tooltipEl.style.left = left + 'px';
  tooltipEl.style.top = top + 'px';
}

function updateTooltipContent(d) {
  tooltipEl.querySelector('.tt-name').textContent = `${d.icon || ''} ${d.name}`;
  tooltipEl.querySelector('.tt-role').textContent = d.role || '';
  tooltipEl.querySelector('.tt-desc').textContent = d.desc || '';
  const statusEl = tooltipEl.querySelector('.tt-status');
  statusEl.textContent = d.status || '';
  statusEl.style.background = (d.statusColor || '#444') + '33';
  statusEl.style.color = d.statusColor || '#fff';
}

function raycastFromScreen(clientX, clientY) {
  mouse.x = (clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObjects(allMeshes);
}

function showDetailPanel(d) {
  detailPanel.style.display = 'block';
  detailPanel.querySelector('.dp-icon').textContent = d.icon || '';
  detailPanel.querySelector('.dp-name').textContent = d.name;
  detailPanel.querySelector('.dp-role').textContent = d.role || '';
  const dpStatus = detailPanel.querySelector('.dp-status');
  dpStatus.textContent = d.status || '';
  dpStatus.style.background = (d.statusColor || '#444') + '33';
  dpStatus.style.color = d.statusColor || '#fff';
  detailPanel.querySelector('.dp-desc').textContent = d.desc || '';
  const connEl = detailPanel.querySelector('.dp-connections');
  if (d.connections && d.connections.length) {
    connEl.innerHTML = '<strong>Connected to:</strong><br>' +
      d.connections.map(c => `<span>→ ${c}</span>`).join('');
  } else {
    connEl.innerHTML = '';
  }
}

// Desktop: mouse events
function onMouseMove(e) {
  const hits = raycastFromScreen(e.clientX, e.clientY);

  if (hits.length > 0) {
    const d = hits[0].object.userData;
    if (d && d.name) {
      hoveredNode = d;
      tooltipEl.style.display = 'block';
      updateTooltipContent(d);
      positionTooltip(e.clientX, e.clientY);
      document.body.style.cursor = 'pointer';
      return;
    }
  }
  hoveredNode = null;
  tooltipEl.style.display = 'none';
  document.body.style.cursor = 'default';
}

function onClick(e) {
  if (!hoveredNode) {
    closeDetail();
    return;
  }
  showDetailPanel(hoveredNode);
}

// Mobile: touch events
let touchStartX = 0, touchStartY = 0, touchMoved = false;

function onTouchStart(e) {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
  }
}

function onTouchMove(e) {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
      touchMoved = true;
    }
  }
}

function onTouchEnd(e) {
  // Only process tap if finger didn't move (not a drag/rotate)
  if (touchMoved || e.changedTouches.length === 0) return;

  const touch = e.changedTouches[0];
  const hits = raycastFromScreen(touch.clientX, touch.clientY);

  if (hits.length > 0) {
    const d = hits[0].object.userData;
    if (d && d.name) {
      // Show tooltip briefly then open detail
      tooltipEl.style.display = 'block';
      updateTooltipContent(d);
      positionTooltip(touch.clientX, touch.clientY);
      showDetailPanel(d);
      // Hide tooltip after a moment on mobile
      setTimeout(() => { tooltipEl.style.display = 'none'; }, 1500);
      return;
    }
  }
  // Tapped empty space — close panel
  closeDetail();
  tooltipEl.style.display = 'none';
}

window.closeDetail = function() { detailPanel.style.display = 'none'; };

// Bind appropriate events
if (isMobile) {
  renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: true });
  renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: true });
  renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: false });
} else {
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('click', onClick);
}

// Bottom sheet swipe-to-dismiss on mobile
if (isMobile) {
  let sheetStartY = 0, sheetDragging = false;
  const dragHandle = detailPanel.querySelector('.dp-drag-handle');

  dragHandle.addEventListener('touchstart', (e) => {
    sheetStartY = e.touches[0].clientY;
    sheetDragging = true;
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!sheetDragging) return;
    const dy = e.touches[0].clientY - sheetStartY;
    if (dy > 0) {
      detailPanel.style.transform = `translateY(${dy}px)`;
    }
  }, { passive: true });

  window.addEventListener('touchend', () => {
    if (!sheetDragging) return;
    sheetDragging = false;
    const currentTransform = detailPanel.style.transform;
    const match = currentTransform.match(/translateY\((\d+)px\)/);
    if (match && parseInt(match[1]) > 80) {
      closeDetail();
    }
    detailPanel.style.transform = '';
  });
}

// ============================================================
// ANIMATION LOOP
// ============================================================

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  controls.update();

  animatedObjects.forEach(o => {
    if (o.type === 'bob') {
      o.mesh.position.y = o.baseY + Math.sin(t * 0.8 + o.phase) * 0.15;
      o.mesh.rotation.y = t * 0.3 + o.phase;
    } else if (o.type === 'pulse') {
      const s = 1 + Math.sin(t * 1.5 + o.phase) * 0.1;
      o.mesh.scale.set(s, s, s);
      o.mesh.rotation.y = t * 0.2 + o.phase;
      o.mesh.rotation.x = t * 0.15;
    }
  });

  alexMesh.position.y = LEADERSHIP_Y + Math.sin(t * 0.6) * 0.1;
  kiwiMesh.position.y = LEADERSHIP_Y + Math.sin(t * 0.6 + 1) * 0.1;
  hubRing.rotation.z = t * 0.1;

  connections.forEach(conn => {
    conn.particles.forEach(p => {
      p.t += p.speed * 0.01;
      if (p.t > 1) p.t -= 1;
      p.mesh.visible = true;
      p.mesh.position.lerpVectors(conn.from, conn.to, p.t);
    });
  });

  renderer.render(scene, camera);
}

animate();

// --- Resize (handles orientation change too) ---
function handleResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', () => {
  setTimeout(handleResize, 100);
});

</script>
